<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGIN ADMINISTRAR</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="css/ico.ico">
</head>
<body>
<div class="container">
    <h2>Iniciar sesión</h2>
    <div class="loginBox">
        <input type="text" id="usuario" placeholder="Usuario">
        <div class="password-box">
            <input type="password" id="password" placeholder="Contraseña">
            <span onclick="togglePass('password', this)">🙈</span>
        </div>
        <button onclick="login()">Entrar</button>
    </div>
    <p id="mensajeLogin"></p>
</div>
<script>

function login(){
    let usuario = document.getElementById("usuario").value.trim();
    let password = document.getElementById("password").value.trim();
    let mensaje = document.getElementById("mensajeLogin");
    mensaje.innerText = "";
    if(usuario === "admin" && password === "123er"){
        mensaje.style.color = "#00ff88";
        mensaje.innerText =
        "✅ Inicio de sesión exitoso";
        localStorage.setItem("usuario", usuario);
        setTimeout(() => {
            window.location.href = "menu.html";
        }, 800);
    }else{
        mensaje.style.color = "#ff4d4d";
        mensaje.innerText =
        "❌ Usuario o contraseña incorrectos";
    }
}

function togglePass(id, icon){
    let input = document.getElementById(id);
    if(input.type === "password"){
        input.type = "text";
        icon.innerText = "👀";
    }else{
        input.type = "password";
        icon.innerText = "🙈";
    }
}
document.getElementById("usuario")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        login();
    }
});
document.getElementById("password")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        login();
    }
});
</script>
</body>
</html>
