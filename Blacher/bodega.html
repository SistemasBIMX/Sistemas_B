<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Inventario</title>
<link rel="stylesheet" href="css/bodega.css">
<link rel="icon" href="css/ico.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="container">
    <h1>Control de Inventario</h1>
      <div class="barra-superior">
    <div class="grupo-filtros">
        <button class="btn-menu" onclick="mostrarTodo()"> Todo </button>
        <button class="btn-menu" onclick="mostrarSoloAltas()">  Entrada  </button>
        <button class="btn-menu" onclick="mostrarSoloBajas()">  Salidas  </button>
    </div>
    <div class="grupo-acciones">
        <button class="btn-excel" onclick="exportarExcel()"> Exportar Excel </button>
        <a href="menu.html" class="btn-menu"> Regresar al Menú </a>
    </div>
</div>
<div class="buscador-container">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="buscador" placeholder="Buscar por producto" onkeyup="buscarRegistros()">
</div>
        <div class="tabla-container">
            <table>
                <thead>
                    <tr>
                        <th>ITEM</th>
                        <th>Fecha Entrada</th>
                        <th>Usuario</th>
                        <th>Departamento</th>
                        <th>Fecha Devolución</th>
                        <th>Consumible</th>
                        <th>Producto</th>
                        <th>Modelo</th>
                        <th>Marca</th>
                        <th>N° Serie</th>
                        <th>Estado</th>
                        <th>Código</th>
                        <th>Observaciones</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaRegistros"></tbody>
            </table>
        </div>
    </div>
</div>
<div id="modalEliminar" class="modal">
    <div class="modal-contenido">
        <h2>Eliminar Registro</h2>
        <p> ¿Seguro que deseas eliminar este registro? </p>
        <div class="modal-botones">
            <button class="btn-cancelar" onclick="cerrarModal()"> Cancelar </button>
            <button class="btn-aceptar" id="btnConfirmarEliminar"> Eliminar </button>
        </div> </div>
</div>
<div id="alertaGuardado" class="alerta exito">
    <i class="fa-solid fa-circle-check"></i>
    Cambios guardados correctamente
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabaseUrl = "https://mgqdwsiktnlblnhjcaer.supabase.co";
const supabaseKey = "sb_publishable_xfJDW7ysQdhRXKMwn0W6Ag_bBBwCpPo";
const clienteSupabase = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

let registros = [];
let filtroActual = "todo";
async function cargarDatos(){
    const { data, error } = await clienteSupabase
    .from("productos")
    .select("*")
    .order("id",{ ascending:true });
    if(error){
        console.log(error);
        alert("Error al cargar datos");
        return;
    }
    registros = data || [];
    renderTabla();
}
cargarDatos();

function generarCodigo(producto, modelo, serie){
    let p = (producto || "XX")
    .substring(0,2)
    .toUpperCase();
    let m = (modelo || "XX")
    .substring(0,2)
    .toUpperCase();
    let s = serie
    ? serie.slice(-4)
    : "0001";
    return p + m + s;
}

function mostrarAlerta(texto){
    let alerta = document.getElementById("alertaGuardado");
    alerta.innerHTML = `
        <i class="fa-solid fa-circle-check"></i>
        ${texto}
    `;
    alerta.classList.add("mostrar");
    setTimeout(()=>{
        alerta.classList.remove("mostrar");
    },2500);
}

function mostrarTodo(){
    filtroActual = "todo";
    renderTabla();
}

function mostrarSoloAltas(){
    filtroActual = "entradas";
    renderTabla();
}

function mostrarSoloBajas(){
    filtroActual = "salidas";
    renderTabla();
}

function renderTabla(){
    let tabla = document.getElementById("tablaRegistros");
    tabla.innerHTML = "";
   let filtrados = registros.filter(registro=>{
    if(filtroActual === "entradas"){
        return (
            !registro.usuario &&
            !registro.departamento &&
            !registro.fecha_devolucion
        );
    }
    if(filtroActual === "salidas"){
        return (
            registro.usuario &&
            registro.departamento &&
            registro.fecha_devolucion
        );
    }
    return true;
});
    filtrados.forEach((registro,index)=>{
        let codigo = generarCodigo(
            registro.producto,
            registro.modelo,
            registro.serie
        );
        console.log(registro.devolucion);
        tabla.innerHTML += `
        <tr>
            <td>${index + 1}</td>
            <td>
                <input type="date" id="fecha${registro.id}" value="${registro.fecha || ""}">
            </td>
            <td>
                <input type="text" id="usuario${registro.id}" value="${registro.usuario || ""}">
            </td>
            <td>
                <input type="text" id="departamento${registro.id}" value="${registro.departamento || ""}">
            </td>
            <td>
                <input type="date" id="fechaDevolucion${registro.id}" value="${registro.fecha_devolucion || ""}">
            </td>
            <td>
                <select id="consumible${registro.id}">
                    <option value="Si"
                    ${registro.consumible === "Si" ? "selected" : ""}>
                    Si
                    </option>
                    <option value="No"
                    ${registro.consumible === "No" ? "selected" : ""}>
                    No
                    </option>

                </select>
            </td>
            <td>
                <input type="text"
                id="producto${registro.id}"
                value="${registro.producto || ""}">
            </td>
            <td>
                <input type="text"
                id="modelo${registro.id}"
                value="${registro.modelo || ""}">
            </td>
            <td>
                <input type="text"
                id="marca${registro.id}"
                value="${registro.marca || ""}">
            </td>
            <td>
                <input type="text"
                id="serie${registro.id}"
                value="${registro.serie || ""}">
            </td>
            <td>
                <select id="estado${registro.id}">
                    <option value="Nuevo"
                    ${registro.estado === "Nuevo" ? "selected" : ""}>
                    Nuevo
                    </option>

                    <option value="Bueno"
                    ${registro.estado === "Bueno" ? "selected" : ""}>
                    Bueno
                    </option>

                    <option value="Regular"
                    ${registro.estado === "Regular" ? "selected" : ""}>
                    Regular
                    </option>

                    <option value="Malo"
                    ${registro.estado === "Malo" ? "selected" : ""}>
                    Malo
                    </option>
                </select>
            </td>
            <td>${codigo}</td>
            <td style="min-width:300px;"> 
                <textarea id="observaciones${registro.id}" rows="3">${registro.observaciones || ""}</textarea>
            </td>
            <td>
                <div class="acciones">
                    <button class="btn-icon btn-guardar" onclick="guardarCambios(${registro.id})">
                    <i class="fa-solid fa-floppy-disk"></i>
                    </button>

                    <button class="btn-icon btn-eliminar" onclick="eliminarRegistro(${registro.id})">
                    <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </td>
        </tr>
        `;
    });
}

function buscarRegistros(){
    let texto = document.getElementById("buscador").value.toLowerCase();
    let filas = document.querySelectorAll("#tablaRegistros tr");
    filas.forEach(fila=>{
        let contenido = fila.textContent.toLowerCase();
        fila.style.display = contenido.includes(texto)
        ? ""
        : "none";
    });
}

async function guardarCambios(id){
    try{
        const datos = {
            fecha: document.getElementById(`fecha${id}`)?.value || null,
            usuario: document.getElementById(`usuario${id}`)?.value?.trim() || null,
            departamento: document.getElementById(`departamento${id}`)?.value?.trim() || null,
            fecha_devolucion: document.getElementById(`fechaDevolucion${id}`)?.value || null,
            consumible: document.getElementById(`consumible${id}`)?.value || "No",
            producto: document.getElementById(`producto${id}`)?.value?.trim() || null,
            modelo: document.getElementById(`modelo${id}`)?.value?.trim() || null,
            marca: document.getElementById(`marca${id}`)?.value?.trim() || null,
            serie: document.getElementById(`serie${id}`)?.value?.trim() || null,
            estado: document.getElementById(`estado${id}`)?.value || "Bueno",
            observaciones: document.getElementById(`observaciones${id}`)?.value?.trim() || null
        };
        console.log("DATOS A GUARDAR:", datos);
        const { data, error } = await clienteSupabase
        .from("productos")
        .update(datos)
        .eq("id", id)
        .select();

        if(error){
            console.log("ERROR SUPABASE:", error);
            alert(
                "Error al guardar: " +
                error.message
            );
            return;
        }

        console.log("GUARDADO:", data);
        mostrarAlerta("Cambios guardados");
        await cargarDatos();
    }catch(err){
        console.log(err);
        alert("Error inesperado");
    }
}

function cerrarModal(){
    document.getElementById(
        "modalEliminar"
    ).style.display = "none";
}

function eliminarRegistro(id){
    let modal = document.getElementById("modalEliminar");
    let btn = document.getElementById(
        "btnConfirmarEliminar"
    );
    modal.style.display = "flex";
    btn.onclick = async function(){
        const { error } =  await clienteSupabase.from("productos").delete().eq("id", id);
        if(error){
            console.log(error);
            alert("Error al eliminar");
            return;
        }
        cerrarModal();
        mostrarAlerta(
            "Registro eliminado"
        );
        cargarDatos();
    };
}
function exportarExcel(){
    let datosFiltrados = registros.filter(registro => {
    if(filtroActual === "entradas"){
        return (
            !registro.usuario &&
            !registro.departamento &&
            !registro.fecha_devolucion
        );
    }
    if(filtroActual === "salidas"){
        return (
            registro.usuario &&
            registro.departamento &&
            registro.fecha_devolucion
        );
    }
    return true;
});
    let datosExcel = datosFiltrados.map((registro, index) => {
        let codigo = generarCodigo(
            registro.producto,
            registro.modelo,
            registro.serie
        );
        return {
            "ITEM": index + 1,
            "Fecha Entrada": registro.fecha || "",
            "Usuario": registro.usuario || "",
            "Departamento": registro.departamento || "",
            "Fecha Devolución": registro.fecha_devolucion || "",
            "Consumible": registro.consumible || "",
            "Producto": registro.producto || "",
            "Modelo": registro.modelo || "",
            "Marca": registro.marca || "",
            "N° Serie": registro.serie || "",
            "Estado": registro.estado || "",
            "Código": codigo,
            "Observaciones": registro.observaciones || ""
        };
    });
    const hoja = XLSX.utils.json_to_sheet(datosExcel);
    hoja["!cols"] = [
        { wch: 8 }, //index
        { wch: 25 }, //fecha
        { wch: 25 }, //usuario
        { wch: 15 }, //departamento
        { wch: 15 }, //fecha devolucion
        { wch: 10 }, //consumible
        { wch: 30 }, //producto
        { wch: 20 }, //modelo
        { wch: 20 }, //marca
        { wch: 20 }, //serie
        { wch: 20 }, //estado
        { wch: 20 }, //codigo
        { wch: 50 } //observacion
    ];
    const libro = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(libro, hoja, "Inventario");
    XLSX.writeFile(
        libro,
        `Inventario_${filtroActual}.xlsx`
    );
}
</script>
</body>
</html>
