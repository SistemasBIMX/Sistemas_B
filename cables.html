<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Cables</title>
<link rel="stylesheet" href="css/cables.css">
<link rel="icon" href="css/ico.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fa-solid fa-plug"></i> Control de Cables</h1>
        <a href="menu.html" class="btn-menu-regresar"> Regresar al Menú</a>
    </div>
    <div class="menu-vista">
            <select id="vista" onchange="cambiarVista()">
                <option value="registro">Registro de Cable</option>
                <option value="tabla">Ver Registros</option>
            </select>
    </div>
        <div id="botones" class="top-bar" style="display:none;">
            <div class="search-box"> <i class="fa-solid fa-search"></i>
                <input type="text" id="buscador" placeholder="Buscar cable por estado y descripción...">
            </div>
            <div style="display:flex; gap:10px;">
                
            <button class="btn-excel" onclick="exportarExcel()">
                <i class="fa-solid fa-file-excel"></i>
                    Excel
            </button>
        </div>
    </div>
    <!-- formulario -->
        <div id="formRegistro" style="display:none;">
        <div class="contenido-formulario">
            <form id="formCable" class="grid-form">
                <div class="campo"><label>Descripción</label>
                    <input type="text" id="descripcion">
                </div>
                <div class="campo"><label>Estado</label>
                    <select id="estado">
                        <option>Nuevo</option>
                        <option>Bueno</option>
                        <option>Regular</option>
                        <option>Malo</option>
                    </select>
                </div>
                <div class="campo"><label>Stock</label>
                    <input type="text" id="stock">
                </div>
                <div class="campo"> <label>UM</label>
                <select id="um">
                    <option value="Pzas">Pzas</option>
                    <option value="Metros">Metros</option>
                </select>
                </div>
                <div class="campo"><label>Devolución</label>
                    <input type="number" id="devolucion">
                </div>
                <button type="submit" class="btn-agregar">
                    Guardar Cable
                </button>
            </form>
        </div>
        </div>
    <!-- tabla -->
    <div id="contenedorTabla" style="display:none;">
        <table id="tablaCables">
            <thead>
                <tr>
                    <th>Descripción</th>
                    <th>Estado</th>
                    <th>Stock</th>
                    <th>UM</th>
                    <th>Salida</th>
                    <th>Devolución</th>
                    <th>Total en Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody> </tbody>
        </table>
    </div>
</div>
<div id="modalEliminar" class="modal">
    <div class="modal-contenido">
        <h3>Eliminar registro</h3>
        <p>¿Deseas eliminar este registro?</p>
        <div class="modal-botones">
            <button class="btn-cancelar" onclick="cerrarModal()"> Cancelar  </button>
            <button class="btn-eliminar-modal" onclick="confirmarEliminar()"> Eliminar </button>
        </div>
    </div>
</div>
            <div id="toast" class="toast">
                <i class="fa-solid fa-circle-check"></i>
                <span id="toastMensaje">Registro guardado correctamente</span>
            </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
        const supabaseUrl = "https://mgqdwsiktnlblnhjcaer.supabase.co";
        const supabaseKey = "sb_publishable_xfJDW7ysQdhRXKMwn0W6Ag_bBBwCpPo";
        const clienteSupabase =
            window.supabase.createClient(
                supabaseUrl,
                supabaseKey
            );
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script>
const buscador = document.getElementById("buscador");    
buscador.addEventListener("keyup", function(){
    let filtro = this.value.toLowerCase();
    let filas = document.querySelectorAll("#tablaCables tbody tr");
    filas.forEach(fila => {
        let descripcion = fila.cells[0].textContent.toLowerCase();
        let estado = fila.cells[1].textContent.toLowerCase();
        fila.style.display =
        descripcion.includes(filtro) ||
        estado.includes(filtro)
        ? ""
        : "none";
    });
});
function cambiarVista(){
    const vista = document.getElementById("vista").value;
    if(vista === "registro"){
        document.getElementById("formRegistro").style.display = "block";
        document.getElementById("contenedorTabla").style.display = "none";
        document.getElementById("botones").style.display = "none";
    }else{
        document.getElementById("formRegistro").style.display = "none";
        document.getElementById("contenedorTabla").style.display = "block";
        document.getElementById("botones").style.display = "flex";
    }
}
function mostrarRegistro(){
    document.getElementById("vista").value = "registro";
    document.getElementById("formRegistro").style.display = "block";
    document.getElementById("contenedorTabla").style.display = "none";
    document.getElementById("botones").style.display = "none";
}
function mostrarTabla(){
    document.getElementById("vista").value = "tabla";
    document.getElementById("formRegistro").style.display = "none";
    document.getElementById("contenedorTabla").style.display = "block";
    document.getElementById("botones").style.display = "flex";
}
let filaEliminar = null;
function cerrarModal(){
    document.getElementById("modalEliminar").style.display = "none";
    filaEliminar = null;
}
function abrirModal(btn){
    filaEliminar = btn.closest("tr");
    document.getElementById("modalEliminar").style.display = "flex";
}
async function confirmarEliminar(){
    if(!filaEliminar) return;
    const id = filaEliminar.dataset.id;
    const { error } = await clienteSupabase.from("cables").delete().eq("id", id);
    if(error){
        alert(error.message);
        return;
    }
    filaEliminar.remove();
    cerrarModal();
    mostrarToast("Registro eliminado");
}
document.getElementById("formCable").addEventListener("submit", async function(e){
    e.preventDefault();
    const stock = parseInt(document.getElementById("stock").value) || 0;
    const salida = parseInt(document.getElementById("salida").value) || 0;
    const devolucion = parseInt(document.getElementById("devolucion").value) || 0;
    const total_stock = stock - salida + devolucion;
    const { error } = await clienteSupabase.from("cables").insert([{

        descripcion: document.getElementById("descripcion").value,
        estado: document.getElementById("estado").value,
        stock,
        um: document.getElementById("um").value,
        salida,
        devolucion,
        total_stock
    }]);
    if(error){
        alert(error.message);
        return;
    }
    mostrarToast("Cable registrado correctamente");
    this.reset();
    cargarCables();
    mostrarRegistro();
});
function mostrarToast(mensaje){
    const toast = document.getElementById("toast");
    document.getElementById("toastMensaje").textContent = mensaje;
    toast.classList.add("mostrar");
    setTimeout(() => {
        toast.classList.remove("mostrar");
    }, 3000);
}
async function cargarCables(){
    const { data, error } = await clienteSupabase.from("cables").select("*").order("id");
    if(error){
        console.error(error);
        return;
    }
    const tbody = document.querySelector("#tablaCables tbody");
    tbody.innerHTML = "";
    data.forEach(cable=>{
        tbody.innerHTML += `
        <tr data-id="${cable.id}">
            <td>${cable.descripcion}</td>
            <td>${cable.estado}</td>
            <td>${cable.stock}</td>
            <td>${cable.um}</td>
            <td>${cable.salida}</td>
            <td>${cable.devolucion}</td>
            <td>${cable.total_stock}</td>
            <td class="acciones">
                <button class="btn-icon editar" onclick="editarFila(this)">
                <i class="fa-solid fa-pen"></i>
                </button>
                <button class="btn-icon eliminar" onclick="abrirModal(this)">
                <i class="fa-solid fa-trash"></i>
                </button>
            </td>
        </tr>
        `;
    });
}
cargarCables();
function editarFila(btn){
    let fila = btn.closest("tr");
    let celdas = fila.querySelectorAll("td");
    for(let i = 0; i < 7; i++){
        let valor = celdas[i].innerText;
        if(i === 1){
            celdas[i].innerHTML = `
                <select>
                    <option value="Nuevo" ${valor === 'Nuevo' ? 'selected' : ''}>Nuevo</option>
                    <option value="Bueno" ${valor === 'Bueno' ? 'selected' : ''}>Bueno</option>
                    <option value="Regular" ${valor === 'Regular' ? 'selected' : ''}>Regular</option>
                    <option value="Malo" ${valor === 'Malo' ? 'selected' : ''}>Malo</option>
                </select>
            `;
        }else if(i === 6){
            celdas[i].innerHTML = `
                <input type="text" value="${valor}" readonly>
            `;
        }else if(i === 3){
            celdas[i].innerHTML = `
                <select>
                    <option value="Pzas" ${valor === 'Pzas' ? 'selected' : ''}>Pzas</option>
                    <option value="Metros" ${valor === 'Metros' ? 'selected' : ''}>Metros</option>
                </select>
            `;
        }else{
            let evento = (i === 2 || i === 4 || i === 5)
                ? 'oninput="calcularTotal(this)"'
                : '';
            celdas[i].innerHTML = `<input type="text" value="${valor}" ${evento}>`;
        }
    }
    btn.innerHTML = '<i class="fa-solid fa-save"></i>';
    btn.onclick = function(){
        guardarFila(this);
    };
}
function calcularTotal(input){
    const fila = input.closest("tr");
    const celdas = fila.querySelectorAll("td");
    const stock = parseInt(celdas[2].querySelector("input").value) || 0;
    const salida = parseInt(celdas[4].querySelector("input").value) || 0;
    const devolucion = parseInt(celdas[5].querySelector("input").value) || 0;
    const total = stock - salida + devolucion;
    celdas[6].querySelector("input").value = total;
}
async function guardarFila(btn){
    let fila = btn.closest("tr");
    let celdas = fila.querySelectorAll("td");
    const descripcion = celdas[0].querySelector("input").value;
    const estado = celdas[1].querySelector("select").value;
    const stock = parseInt(celdas[2].querySelector("input").value) || 0;
    const um = celdas[3].querySelector("select").value;
    const salida = parseInt(celdas[4].querySelector("input").value) || 0;
    const devolucion = parseInt(celdas[5].querySelector("input").value) || 0;
    const total_stock = stock - salida + devolucion;
    const id = fila.dataset.id;
    const { error } = await clienteSupabase.from("cables").update({
        descripcion,
        estado,
        stock,
        um,
        salida,
        devolucion,
        total_stock
    })
    .eq("id", id);
    if(error){
        alert(error.message);
        return;
    }
    celdas[0].innerHTML = descripcion;
    celdas[1].innerHTML = estado;
    celdas[2].innerHTML = stock;
    celdas[3].innerHTML = um;
    celdas[4].innerHTML = salida;
    celdas[5].innerHTML = devolucion;
    celdas[6].innerHTML = total_stock;
    btn.innerHTML = '<i class="fa-solid fa-pen"></i>';
    btn.onclick = function(){
        editarFila(this);
    };
}
function exportarExcel(){
    let tabla = document.getElementById("tablaCables").cloneNode(true);
    tabla.querySelectorAll("tr").forEach(fila => {
        fila.deleteCell(fila.cells.length - 1);
    });
    const wb = XLSX.utils.table_to_book(tabla, {
        sheet:"Cables"
    });
    const ws = wb.Sheets["Cables"];
    ws["!cols"] = [
        { wch: 30 }, 
        { wch: 15 }, 
        { wch: 10 }, 
        { wch: 10 }, 
        { wch: 12 }, 
        { wch: 12 }, 
        { wch: 15 }  
    ];
    XLSX.writeFile(wb, "Control_Cables.xlsx");
}

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("vista").value = "registro";
    mostrarRegistro();
});
</script>
</body>
</html>
